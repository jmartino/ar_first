<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.8); color: white; z-index: 999; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        font-family: sans-serif; cursor: pointer; 
      }
      /* The scanning line animation */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 998; display: none; pointer-events: none;
        border: 5px solid rgba(255,255,255,0.5); box-sizing: border-box;
      }
      #scanning-line {
        width: 100%; height: 4px; background: #00fff2;
        position: absolute; top: 0;
        animation: scan 3s linear infinite;
      }
      @keyframes scan {
        0% { top: 0%; } 100% { top: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <h1 id="ui-text">INITIALIZING...</h1>
      <p>Please wait a moment</p>
    </div>

    <div id="scanning-overlay">
      <div id="scanning-line"></div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; autoStart: false;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="arVideo" src="video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video src="#arVideo" width="1" height="1.301" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const ui = document.querySelector('#ui');
      const uiText = document.querySelector('#ui-text');
      const scanOverlay = document.querySelector('#scanning-overlay');
      const video = document.querySelector('#arVideo');
      const sceneEl = document.querySelector('a-scene');

      // Wait for the AR engine to be ready
      sceneEl.addEventListener("ready", () => {
        uiText.innerText = "TAP TO START AR";
      });

      ui.addEventListener('click', () => {
        // Only start if the engine is ready
        const arSystem = sceneEl.systems["mindar-image-system"];
        arSystem.start(); 
        
        ui.style.display = 'none';
        scanOverlay.style.display = 'block';
        video.play();
        video.pause(); // Pre-warm the video for Safari
      });

      // Hide the scanning line once the art is found
      const targetEntity = document.querySelector('#target');
      targetEntity.addEventListener("targetFound", () => {
        scanOverlay.style.display = 'none';
        video.play();
      });

      targetEntity.addEventListener("targetLost", () => {
        scanOverlay.style.display = 'block';
      });
    </script>
  </body>
</html>
