<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* This makes a simple "Start" button so the video can play on mobile */
      #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); 
            color: white; z-index: 999; display: flex; align-items: center; justify-content: center; 
            font-family: sans-serif; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="ui"><h1>TAP TO START AR</h1></div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <video id="arVideo" src="video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#arVideo" width="1" height="1.301" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const ui = document.querySelector('#ui');
      const video = document.querySelector('#arVideo');
      ui.addEventListener('click', () => {
        video.play();
        ui.style.display = 'none';
      });
    </script>
  </body>
</html>
