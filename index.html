<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* Full-screen UI Overlay */
      #ui { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: #000; color: #fff; z-index: 999; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      }
      /* Simple Animated Loader */
      .loader { 
        border: 4px solid #333; border-top: 4px solid #fff; border-radius: 50%; 
        width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; 
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
      /* Start Button - Hidden until AR is ready */
      #startBtn { 
        display: none; padding: 15px 35px; background: #fff; color: #000; 
        border: none; border-radius: 50px; font-weight: bold; cursor: pointer; 
        letter-spacing: 1px; transition: transform 0.2s;
      }
      #startBtn:active { transform: scale(0.95); }
      #loadingText { font-size: 12px; letter-spacing: 2px; opacity: 0.6; }
    </style>
  </head>

  <body>
    <div id="ui">
      <div class="loader" id="loader"></div>
      <div id="loadingText">INITIALIZING AR...</div>
      <button id="startBtn">VIEW EXPERIENCE</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.001; filterBeta: 1000;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="arVideo" src="video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#arVideo" width="1" height="1.301" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const sceneEl = document.querySelector('a-scene');
        const loader = document.querySelector('#loader');
        const loadingText = document.querySelector('#loadingText');
        const startBtn = document.querySelector('#startBtn');
        const video = document.querySelector('#arVideo');

        // Wait for the AR system to find the camera and targets
        sceneEl.addEventListener("ready", () => {
          loader.style.display = "none";
          loadingText.style.display = "none";
          startBtn.style.display = "block";
        });

        // Handle the "Start" click to comply with mobile autoplay rules
        startBtn.addEventListener('click', () => {
          video.play();
          document.querySelector('#ui').style.display = 'none';
        });
        
        // Error handling if video fails
        video.addEventListener('error', () => {
          alert("Video failed to load. Check format/extension.");
        });
      });
    </script>
  </body>
</html>
