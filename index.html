<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      
      /* Initial Overlay - Blocks everything until user interacts */
      #ui { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.9); color: white; z-index: 999; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        font-family: sans-serif; cursor: pointer; text-align: center;
      }

      /* Scanning Line Animation - Shows while looking for the image */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 998; display: none; pointer-events: none;
        border: 8px solid rgba(0, 255, 242, 0.2); box-sizing: border-box;
      }
      
      #scanning-line {
        width: 100%; height: 4px; background: #00fff2;
        position: absolute; top: 0;
        box-shadow: 0 0 15px #00fff2;
        animation: scan 4s linear infinite;
      }

      @keyframes scan {
        0% { top: 0%; }
        50% { top: 100%; }
        100% { top: 0%; }
      }
