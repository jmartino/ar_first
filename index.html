<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      
      /* Initial Overlay */
      #ui { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.9); color: white; z-index: 999; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        font-family: sans-serif; cursor: pointer; text-align: center;
      }

      /* Scanning Line Animation */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 998; display: none; pointer-events: none;
        border: 8px solid rgba(255,255,255,0.3); box-sizing: border-box;
      }
      
      #scanning-line {
        width: 100%; height: 4px; background: #00fff2;
        position: absolute; top: 0;
        box-shadow: 0 0 15px #00fff2;
        animation: scan 4s linear infinite;
      }

      @keyframes scan {
        0% { top: 0%; }
        50% { top: 100%; }
        100% { top: 0%; }
      }

      .instructions { font-size: 0.8em; opacity: 0.7; margin-top: 10px; }
    </style>
  </head>

  <body>
    <div id="ui">
      <h1>ENTER EXPERIENCE</h1>
      <p class="instructions">Allow camera access and point at the artwork.</p>
    </div>

    <div id="scanning-overlay">
      <div id="scanning-line"></div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      embedded>
      
      <a-assets>
        <video id="arVideo" src="video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video src="#arVideo" width="1" height="1.301" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const ui = document.querySelector('#ui');
      const scanOverlay = document.querySelector('#scanning-overlay');
      const video = document.querySelector('#arVideo');
      const sceneEl = document.querySelector('a-scene');

      ui.addEventListener('click', () => {
        // 1. Hide the Start UI
        ui.style.display = 'none';
        
        // 2. Start the AR Engine manually
        const arSystem = sceneEl.systems["mindar-image-system"];
        arSystem.start(); 

        // 3. Show the scanning line
        scanOverlay.style.display = 'block';

        // 4. Force video to 'unlock' for Safari
        video.play().then(() => {
          video.pause(); // Hold it until target is found
        }).catch(e => console.log("Video setup:", e));
      });

      // Target Detection Logic
      const targetEntity = document.querySelector('#target');
      
      targetEntity.addEventListener("targetFound", () => {
        console.log("Found!");
        scanOverlay.style.display = 'none';
        video.play();
      });

      targetEntity.addEventListener("targetLost", () => {
        console.log("Lost!");
        scanOverlay.style.display = 'block';
        video.pause();
      });
    </script>
  </body>
</html>
